# Sync rugby quotidien (section 5) : 7 ligues × 9 dates (J-1 à J+7)
# = 63 requêtes/jour, sous le quota de 100/jour de la sous-API rugby.
name: sync-rugby

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      HIGHLIGHTLY_API_KEY: ${{ secrets.HIGHLIGHTLY_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Sync des matchs rugby
        run: python scripts/sync_matches.py --sport rugby
      - name: Règlement des paris
        if: always()
        run: python scripts/settle_bets.py
