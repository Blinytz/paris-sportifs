# Sync foot quotidien : fenêtre J-1 à J+9, une requête par date (toutes
# ligues à la fois), ~30 requêtes sur les 100/jour de la sous-API foot.
#
# Horaire : 2h45 UTC, soit 4h45 en heure française d'été (UTC+2) et 3h45
# en hiver (UTC+1). Le run dure ~1 min : les résultats de la veille sont
# donc en place avant 5h du matin, toute l'année. La minute décalée évite
# les heures pleines, où GitHub retarde le plus souvent les tâches.
name: sync-football

on:
  schedule:
    - cron: "45 2 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      HIGHLIGHTLY_API_KEY: ${{ secrets.HIGHLIGHTLY_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Sync des matchs foot
        run: python scripts/sync_matches.py --sport football
      - name: Règlement des paris
        if: always()
        run: python scripts/settle_bets.py
