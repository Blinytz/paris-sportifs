# Sonde ponctuelle de l'API (quelques requêtes) : voir scripts/probe_api.py
name: probe-api

on:
  workflow_dispatch:
    inputs:
      action:
        description: "dates | leagues"
        default: "dates"
      sport:
        description: "football | rugby (action=leagues)"
        default: "rugby"
      motif:
        description: "filtre sur le nom (action=leagues)"
        default: ""

jobs:
  probe:
    runs-on: ubuntu-latest
    env:
      HIGHLIGHTLY_API_KEY: ${{ secrets.HIGHLIGHTLY_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - run: python scripts/probe_api.py "${{ inputs.action }}" "${{ inputs.sport }}" "${{ inputs.motif }}"
